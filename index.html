<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống SOS Cloud</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --blue: #1e40af; --red: #dc2626; --green: #16a34a; --dark: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); margin: 0; color: #333; }
        
        /* Màn hình đăng nhập */
        #login-page { height: 100vh; display: flex; justify-content: center; align-items: center; background: #0f172a; position: fixed; width: 100%; z-index: 1000; }
        .login-box { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 360px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .tab-group { display: flex; margin-bottom: 20px; background: #f1f5f9; border-radius: 10px; padding: 5px; }
        .tab { flex: 1; padding: 10px; cursor: pointer; border-radius: 8px; font-weight: bold; color: #64748b; }
        .tab.active { background: white; color: var(--blue); }
        .inp { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; color: white; font-weight: bold; cursor: pointer; background: var(--blue); margin-top: 10px; }
        .btn:active { opacity: 0.8; }

        /* Màn hình chính */
        #dash { display: none; padding: 15px; background: #f8fafc; min-height: 100vh; }
        .header { font-size: 18px; font-weight: bold; padding: 15px; border-radius: 12px; text-align: center; color: white; margin-bottom: 20px; position: relative; }
        .safe-bg { background: var(--green); }
        .danger-bg { background: var(--red); animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0.7; } }
        
        .logout-btn { position: absolute; right: 15px; top: 12px; background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid white; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        #map-frame { width: 100%; height: 300px; border-radius: 12px; background: #eee; }
        #logs { background: #1e293b; color: #38bdf8; padding: 10px; height: 150px; overflow-y: auto; font-family: monospace; border-radius: 8px; font-size: 11px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-box">
            <h2 style="color: var(--blue); margin-top: 0;">SOS SYSTEM</h2>
            <div class="tab-group">
                <div class="tab active" id="tab-login" onclick="setTab('login')">Đăng nhập</div>
                <div class="tab" id="tab-reg" onclick="setTab('reg')">Đăng ký</div>
            </div>
            <input type="text" id="user_id" class="inp" placeholder="Tên đăng nhập">
            <input type="password" id="user_pass" class="inp" placeholder="Mật khẩu">
            <button class="btn" id="auth-btn" onclick="handleAuth()">VÀO HỆ THỐNG</button>
            <p id="error-text" style="color: red; font-size: 12px; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="dash">
        <div id="st-header" class="header safe-bg">
            <span id="st-text">TRẠNG THÁI: AN TOÀN</span>
            <div class="logout-btn" onclick="location.reload()">Đăng xuất</div>
        </div>
        
        <div class="card">
            <h3 style="margin-top:0">Vị trí xe</h3>
            <div id="map-frame"></div>
        </div>

        <div class="card">
            <button class="btn" style="background:#334155" onclick="sendReset()">XÁC NHẬN AN TOÀN</button>
            <div id="logs"></div>
        </div>
    </div>

    <script>
        // 1. CẤU HÌNH FIREBASE - HÃY THAY MÃ CỦA BẠN VÀO ĐÂY
        const firebaseConfig = {
            apiKey: "AIzaSyChyZAmeBu2WLwsEzVrWFULbTYpl-nG0fE",
            authDomain: "hethongsos.firebaseapp.com",
            databaseURL: "https://hethongsos-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "hethongsos",
            storageBucket: "hethongsos.appspot.com",
            messagingSenderId: "922952133122",
            appId: "1:922952133122:web:8da5b17a64aa7c7954551b"
        };

        // Khởi tạo Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();
        let mode = 'login';
        let map, marker, mqtt;

        // Chuyển đổi tab Đăng ký / Đăng nhập
        function setTab(t) {
            mode = t;
            document.getElementById('tab-login').className = (t === 'login' ? 'tab active' : 'tab');
            document.getElementById('tab-reg').className = (t === 'reg' ? 'tab active' : 'tab');
            document.getElementById('auth-btn').innerText = (t === 'login' ? 'VÀO HỆ THỐNG' : 'TẠO TÀI KHOẢN');
            document.getElementById('error-text').innerText = "";
        }

        // Xử lý logic Đăng ký & Đăng nhập
        function handleAuth() {
            const id = document.getElementById('user_id').value.trim();
            const pass = document.getElementById('user_pass').value.trim();
            const err = document.getElementById('error-text');

            if(!id || !pass) {
                err.innerText = "Vui lòng nhập đầy đủ tên và mật khẩu!";
                return;
            }

            if(mode === 'reg') {
                // Lệnh ĐĂNG KÝ
                db.ref('users/' + id).set({ password: pass })
                .then(() => {
                    alert("Đăng ký thành công! Đang chuyển sang Đăng nhập...");
                    setTab('login'); // Tự động chuyển tab
                })
                .catch(() => { err.innerText = "Lỗi: Không thể kết nối Firebase!"; });
            } else {
                // Lệnh ĐĂNG NHẬP
                db.ref('users/' + id).once('value').then((snapshot) => {
                    if(snapshot.exists() && snapshot.val().password === pass) {
                        document.getElementById('login-page').style.display = 'none';
                        document.getElementById('dash').style.display = 'block';
                        startApp();
                    } else {
                        err.innerText = "Sai tên đăng nhập hoặc mật khẩu!";
                    }
                });
            }
        }

        // Khởi tạo Bản đồ và MQTT sau khi vào được hệ thống
        function startApp() {
            // Load bản đồ
            map = L.map('map-frame').setView([21.0285, 105.8542], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker([21.0285, 105.8542]).addTo(map);
            
            // Kết nối MQTT
            mqtt = new Paho.MQTT.Client("broker.hivemq.com", 8000, "user_" + Math.random().toString(16).substr(2, 8));
            
            mqtt.onMessageArrived = function(message) {
                const data = message.payloadString.split('|');
                if(data[0] === 'danger') {
                    document.getElementById('st-header').className = "header danger-bg";
                    document.getElementById('st-text').innerText = "!!! CẢNH BÁO TAI NẠN !!!";
                    const lat = parseFloat(data[1]);
                    const lng = parseFloat(data[2]);
                    map.setView([lat, lng], 17);
                    marker.setLatLng([lat, lng]);
                    addLog("PHÁT HIỆN TAI NẠN tại: " + lat + ", " + lng);
                }
            };

            mqtt.connect({
                onSuccess: function() {
                    mqtt.subscribe("hethong_sos/data");
                    addLog("Hệ thống Cloud: Đã sẵn sàng.");
                },
                useSSL: false
            });
        }

        function sendReset() {
            if(mqtt && mqtt.isConnected()) {
                const msg = new Paho.MQTT.Message("reset_system");
                msg.destinationName = "hethong_sos/lenh";
                mqtt.send(msg);
                document.getElementById('st-header').className = "header safe-bg";
                document.getElementById('st-text').innerText = "TRẠNG THÁI: AN TOÀN";
                addLog("Đã gửi lệnh xác nhận an toàn.");
            }
        }

        function addLog(txt) {
            const logBox = document.getElementById('logs');
            logBox.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${txt}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }
    </script>
</body>
</html>
