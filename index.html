<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống SOS Cloud</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --blue: #1e40af; --red: #dc2626; --green: #16a34a; --dark: #0f172a; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--dark); margin: 0; overflow-x: hidden; }
        
        /* Giao diện Đăng nhập / Đăng ký */
        #login-page { height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); }
        .login-box { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 360px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .tab-group { display: flex; margin-bottom: 20px; background: #f1f5f9; border-radius: 10px; padding: 5px; }
        .tab { flex: 1; padding: 10px; cursor: pointer; border-radius: 8px; font-weight: bold; color: #64748b; transition: 0.3s; }
        .tab.active { background: white; color: var(--blue); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .inp { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 15px; background: var(--blue); }

        /* Giao diện Dashboard (Giữ nguyên phong cách cũ) */
        #dash { display: none; padding: 15px; background: #f8fafc; min-height: 100vh; }
        .header { font-size: 18px; font-weight: bold; padding: 15px; border-radius: 12px; text-align: center; color: white; margin-bottom: 20px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .safe-bg { background: var(--green); }
        .danger-bg { background: var(--red); animation: alertFlash 0.6s infinite; }
        @keyframes alertFlash { 0% { background: var(--red); } 50% { background: #7f1d1d; } 100% { background: var(--red); } }
        
        .grid { display: grid; grid-template-columns: 1.3fr 1fr; gap: 20px; }
        .card { background: white; padding: 18px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 10px; }
        #map-frame { width: 100%; height: 300px; border-radius: 12px; border: 1px solid #e2e8f0; }
        #logs { background: #1e293b; color: #38bdf8; padding: 12px; height: 200px; overflow-y: auto; font-family: monospace; border-radius: 10px; font-size: 11px; }
        .history-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .history-table td { padding: 8px; border-bottom: 1px solid #f1f5f9; }
        
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-box">
            <i class="fas fa-shield-alt" style="font-size: 40px; color: var(--blue); margin-bottom: 10px;"></i>
            <h2 style="color: var(--blue); margin: 0 0 20px 0;">HỆ THỐNG SOS</h2>
            
            <div class="tab-group">
                <div class="tab active" id="tab-login" onclick="switchTab('login')">Đăng nhập</div>
                <div class="tab" id="tab-reg" onclick="switchTab('reg')">Đăng ký</div>
            </div>

            <input type="text" id="user_id" class="inp" placeholder="Mã định danh (ví dụ: xe01)">
            <input type="password" id="user_pass" class="inp" placeholder="Mật khẩu">
            <button class="btn" id="auth-btn" onclick="handleAuth()">KẾT NỐI NGAY</button>
            <p id="error-msg" style="color: red; font-size: 12px; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="dash">
        <div id="st-header" class="header safe-bg">
            <span id="st-text">TRẠNG THÁI: HỆ THỐNG SẴN SÀNG</span>
            <i class="fas fa-power-off" style="position: absolute; right: 20px; top: 18px; cursor: pointer;" onclick="logout()" title="Đăng xuất"></i>
        </div>
        
        <div class="grid">
            <div class="left">
                <div class="card">
                    <h3><i class="fas fa-map-marker-alt" style="color:red"></i> Vị trí hiện tại</h3>
                    <div id="map-frame"></div>
                    <p style="margin-top:12px; font-size: 13px;">Tọa độ: <span id="pos-info" style="font-weight:bold; color:var(--blue)">Chờ tín hiệu...</span></p>
                </div>
                <div class="card">
                    <h3><i class="fas fa-history"></i> Lịch sử sự cố</h3>
                    <div style="max-height: 150px; overflow-y: auto;">
                        <table class="history-table"><tbody id="history-body"></tbody></table>
                    </div>
                </div>
            </div>

            <div class="right">
                <div class="card">
                    <h3><i class="fas fa-sliders-h"></i> Điều khiển</h3>
                    <button class="btn" style="background: #334155;" onclick="sendReset()">XÁC NHẬN AN TOÀN</button>
                </div>
                <div class="card">
                    <h3><i class="fas fa-terminal"></i> Nhật ký Cloud</h3>
                    <div id="logs"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
     const firebaseConfig = { 
  apiKey : "AIzaSyChyZAmeBu2WLwsEzVrWFULbTYpl-nG0fE" , 
  authDomain : "hethongsos.firebaseapp.com" , 
  projectId : "hethongsos" , 
  storageBucket : "hethongsos.firebasestorage.app" , 
  messagingSenderId : "922952133122" , 
  appId : "1:922952133122:web:8da5b17a64aa7c7954551b" , 
  measurementId : "G-KNHVJCGV6Z" 
};
        // ------------------------------------

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentTab = 'login';
        let deviceID = "";
        let map, marker, mqttClient;

        function switchTab(type) {
            currentTab = type;
            document.getElementById('tab-login').classList.toggle('active', type === 'login');
            document.getElementById('tab-reg').classList.toggle('active', type === 'reg');
            document.getElementById('auth-btn').innerText = type === 'login' ? 'KẾT NỐI NGAY' : 'TẠO TÀI KHOẢN';
            document.getElementById('error-msg').innerText = "";
        }

        // Xử lý Cloud Auth
        function handleAuth() {
            const id = document.getElementById('user_id').value.trim();
            const pass = document.getElementById('user_pass').value.trim();
            if(!id || !pass) return alert("Vui lòng nhập đủ tin!");

            if(currentTab === 'reg') {
                db.ref('users/' + id).set({ password: pass })
                  .then(() => { alert("Đăng ký thành công! Hãy đăng nhập."); switchTab('login'); })
                  .catch(() => alert("Lỗi kết nối Firebase!"));
            } else {
                db.ref('users/' + id).once('value').then((snapshot) => {
                    if(snapshot.exists() && snapshot.val().password === pass) {
                        deviceID = id;
                        enterDashboard();
                    } else {
                        document.getElementById('error-msg').innerText = "Sai ID hoặc mật khẩu!";
                    }
                });
            }
        }

        function enterDashboard() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('dash').style.display = 'block';
            initMap();
            connectMQTT();
            addLog("Đăng nhập thành công với ID: " + deviceID);
        }

        function logout() {
            if(confirm("Bạn có muốn đăng xuất?")) {
                location.reload(); // Tải lại trang để xóa sạch trạng thái
            }
        }

        // MQTT & Map
        function initMap() {
            map = L.map('map-frame').setView([21.0285, 105.8542], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker([21.0285, 105.8542]).addTo(map);
        }

        function connectMQTT() {
            mqttClient = new Paho.MQTT.Client("broker.hivemq.com", 8000, "client_" + Math.random());
            mqttClient.onMessageArrived = (msg) => {
                const payload = msg.payloadString.split('|');
                if(payload[0] === "danger") {
                    updateAlert(true, payload[1], payload[2]);
                }
            };
            mqttClient.connect({ onSuccess: () => {
                mqttClient.subscribe("hethong_sos/data");
                addLog("MQTT: Đã kết nối thành công.");
            }});
        }

        function updateAlert(isDanger, lat, lng) {
            const header = document.getElementById('st-header');
            if(isDanger) {
                header.className = "header danger-bg";
                document.getElementById('st-text').innerText = "!!! CẢNH BÁO TAI NẠN !!!";
                document.getElementById('pos-info').innerText = lat + ", " + lng;
                map.setView([parseFloat(lat), parseFloat(lng)], 17);
                marker.setLatLng([parseFloat(lat), parseFloat(lng)]);
                addLog(`CẢNH BÁO: Phát hiện va chạm tại ${lat}, ${lng}`);
                
                // Thêm vào lịch sử (tạm thời trên máy)
                const time = new Date().toLocaleTimeString();
                document.getElementById('history-body').insertAdjacentHTML('afterbegin', 
                    `<tr><td>${time}</td><td style="color:red">Sự cố</td><td>${lat},${lng}</td></tr>`);
            }
        }

        function sendReset() {
            if(mqttClient) {
                const msg = new Paho.MQTT.Message("reset_system");
                msg.destinationName = "hethong_sos/lenh";
                mqttClient.send(msg);
                document.getElementById('st-header').className = "header safe-bg";
                document.getElementById('st-text').innerText = "TRẠNG THÁI: HỆ THỐNG SẴN SÀNG";
                addLog("Hệ thống đã được reset về trạng thái an toàn.");
            }
        }

        function addLog(txt) {
            const box = document.getElementById('logs');
            box.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${txt}</div>`;
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
